<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="${#authorization.expression('isAuthenticated()') ? 'layout/main_layout' : 'layout/landing_layout'}">

<head>
    <title>Chi tiết phòng - LuxeStay</title>
    <style>
        .gallery-scrollbar::-webkit-scrollbar { height: 6px; }
        .gallery-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .gallery-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .gallery-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>

<body>
    <div layout:fragment="content" class="pb-20 px-10 max-w-[1400px] mx-auto"
        th:classappend="${#authorization.expression('isAuthenticated()')} ? 'pt-10' : 'pt-32'">
        
        <input type="hidden" id="room-type-id-hidden" th:value="${roomTypeId}">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <!-- Left: Gallery & Description -->
            <div class="space-y-12">
                <div class="relative group">
                    <div class="aspect-[16/10] rounded-[56px] overflow-hidden bg-slate-100 shadow-2xl border-4 border-white">
                        <img id="main-gallery-image" src="" class="w-full h-full object-cover transition-all duration-700">
                    </div>
                    <!-- Thumbnails -->
                    <div id="gallery-thumbs" class="flex gap-4 mt-6 overflow-x-auto pb-4 gallery-scrollbar">
                        <!-- Thumbnails will be injected here -->
                    </div>
                </div>

                <div class="bg-white rounded-[48px] p-10 border border-slate-100 shadow-sm space-y-8">
                    <div>
                        <h2 class="text-3xl font-black text-slate-900 mb-4">Mô tả phòng</h2>
                        <p id="room-description" class="text-slate-500 font-medium leading-relaxed"></p>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                            <i data-lucide="users" class="w-6 h-6 text-indigo-600 mb-3"></i>
                            <h4 class="font-black text-slate-900">Sức chứa</h4>
                            <p id="room-capacity" class="text-slate-500 font-medium"></p>
                        </div>
                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                            <i data-lucide="layout" class="w-6 h-6 text-indigo-600 mb-3"></i>
                            <h4 class="font-black text-slate-900">Diện tích</h4>
                            <p class="text-slate-500 font-medium">45m² - 60m²</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Booking & Feedbacks -->
            <div class="space-y-12">
                <!-- Info & Pricing -->
                <div class="bg-slate-900 rounded-[56px] p-12 text-white shadow-2xl shadow-slate-900/20 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-600/20 blur-[100px] rounded-full -mr-32 -mt-32"></div>
                    <h1 id="room-type-name" class="text-5xl font-black mb-6"></h1>
                    <div class="flex items-center gap-4 mb-10">
                        <span id="room-price" class="text-4xl font-black text-indigo-400"></span>
                        <span class="text-slate-400 font-bold uppercase tracking-widest text-xs">/ đêm</span>
                    </div>

                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Ngày nhận phòng</label>
                                <input type="date" id="check-in-date" onchange="handleDateChange('checkin')" class="w-full bg-white/10 border-none rounded-2xl px-6 py-4 outline-none focus:ring-4 focus:ring-indigo-500/20 font-bold text-white">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Ngày trả phòng</label>
                                <input type="date" id="check-out-date" onchange="handleDateChange('checkout')" class="w-full bg-white/10 border-none rounded-2xl px-6 py-4 outline-none focus:ring-4 focus:ring-indigo-500/20 font-bold text-white">
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div id="booking-action-container" class="space-y-4">
                                <button onclick="goToBooking()" class="w-full bg-indigo-600 text-white py-6 rounded-[32px] font-black text-xl shadow-2xl shadow-indigo-600/30 hover:scale-[1.02] transition-all flex items-center justify-center gap-4">
                                    <i data-lucide="calendar-plus" class="w-6 h-6"></i>
                                    Đặt loại phòng này
                                </button>
                            </div>
                            <div id="no-rooms-alert" class="hidden p-6 bg-rose-500/10 border border-rose-500/20 rounded-3xl text-rose-400 text-center font-bold">
                                Vui lòng chọn ngày để kiểm tra phòng trống.
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Feedbacks -->
                <div class="bg-white rounded-[48px] p-10 border border-slate-100 shadow-sm h-fit">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-black text-slate-900">Đánh giá của khách hàng</h2>
                        <div id="rating-badge" class="hidden items-center gap-2 px-4 py-2 bg-amber-50 rounded-2xl border border-amber-100">
                            <i data-lucide="star" class="w-4 h-4 text-amber-500 fill-amber-500"></i>
                            <span id="average-rating" class="font-black text-amber-700">0.0</span>
                            <span id="review-count" class="text-[10px] text-amber-400 font-bold ml-1">(0)</span>
                        </div>
                    </div>

                    <div id="feedback-container" class="space-y-8">
                        <!-- Feedbacks will be injected here -->
                    </div>
                    
                    <button id="load-more-feedback" class="w-full mt-8 py-4 text-slate-400 font-black text-xs uppercase tracking-widest hover:text-indigo-600 transition-colors hidden">
                        Xem thêm đánh giá
                    </button>
                    
                    <div id="no-feedback-state" class="hidden py-10 text-center">
                        <p class="text-slate-400 font-bold italic">Chưa có đánh giá nào cho loại phòng này.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script layout:fragment="script">
        const roomTypeId = document.getElementById('room-type-id-hidden').value;
        let currentFeedbackPage = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            // Set default dates: tomorrow and day after tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const nextDay = new Date();
            nextDay.setDate(nextDay.getDate() + 2);
            
            const checkInInput = document.getElementById('check-in-date');
            const checkOutInput = document.getElementById('check-out-date');
            
            const todayStr = new Date().toISOString().split('T')[0];
            checkInInput.min = todayStr;
            checkInInput.value = tomorrow.toISOString().split('T')[0];
            
            checkOutInput.min = nextDay.toISOString().split('T')[0];
            checkOutInput.value = nextDay.toISOString().split('T')[0];
            
            await Promise.all([
                loadRoomTypeDetail(),
                loadAvailableRooms(),
                loadFeedbacks()
            ]);

            // Events are already handled via onchange in HTML
        });

        function handleDateChange(type) {
            const checkinInput = document.getElementById('check-in-date');
            const checkoutInput = document.getElementById('check-out-date');
            const checkinDate = new Date(checkinInput.value);
            
            if (type === 'checkin') {
                const minCheckoutDate = new Date(checkinDate);
                minCheckoutDate.setDate(minCheckoutDate.getDate() + 1);
                const minStr = minCheckoutDate.toLocaleDateString('en-CA');
                
                checkoutInput.min = minStr;
                if (new Date(checkoutInput.value) <= checkinDate) {
                    checkoutInput.value = minStr;
                }
            } else if (type === 'checkout') {
                const checkoutDate = new Date(checkoutInput.value);
                if (checkoutDate <= checkinDate) {
                    const newCheckinDate = new Date(checkoutDate);
                    newCheckinDate.setDate(newCheckinDate.getDate() - 1);
                    checkinInput.value = newCheckinDate.toLocaleDateString('en-CA');
                }
            }
            loadAvailableRooms();
        }

        async function loadRoomTypeDetail() {
            try {
                const response = await fetch(`/api/room-types/${roomTypeId}`);
                const data = await response.json();

                document.getElementById('room-type-name').textContent = data.typeName;
                document.getElementById('room-price').textContent = new Intl.NumberFormat('vi-VN').format(data.price) + ' VNĐ';
                document.getElementById('room-capacity').textContent = data.capacity + ' người';
                document.getElementById('room-description').textContent = data.description || 'Không gian nghỉ dưỡng sang trọng, đẳng cấp với trang thiết bị hiện đại và dịch vụ tận tâm.';

                // Gallery: Lọc bỏ các ảnh null hoặc rỗng
                let images = (data.galleryImages || []).filter(url => url && url.trim() !== '');
                if (images.length === 0 && data.roomImage) {
                    images = [data.roomImage];
                }
                // Nếu vẫn rỗng, dùng ảnh placeholder mặc định
                if (images.length === 0) {
                    images = ['https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80&w=1200'];
                }
                renderGallery(images);

                // Rating Badge logic
                const ratingBadge = document.getElementById('rating-badge');
                if (data.reviewCount > 0) {
                    ratingBadge.classList.remove('hidden');
                    ratingBadge.classList.add('flex');
                    document.getElementById('average-rating').textContent = data.averageRating.toFixed(1);
                    document.getElementById('review-count').textContent = `(${data.reviewCount})`;
                } else {
                    ratingBadge.classList.add('hidden');
                    ratingBadge.classList.remove('flex');
                }
            } catch (error) {
                console.error('Error loading detail:', error);
            }
        }

        function renderGallery(images) {
            const mainImg = document.getElementById('main-gallery-image');
            const thumbContainer = document.getElementById('gallery-thumbs');
            
            if (images && images.length > 0) {
                mainImg.src = images[0];
                thumbContainer.innerHTML = images.map((url, index) => `
                    <div class="flex-shrink-0 w-24 h-24 rounded-2xl overflow-hidden cursor-pointer border-2 ${index === 0 ? 'border-indigo-600' : 'border-transparent'} hover:border-indigo-400 transition-all opacity-70 hover:opacity-100"
                         onclick="changeMainImage(this, '${url}')">
                        <img src="${url}" class="w-full h-full object-cover">
                    </div>
                `).join('');
            }
        }

        function changeMainImage(thumb, url) {
            document.getElementById('main-gallery-image').src = url;
            document.querySelectorAll('#gallery-thumbs div').forEach(div => div.classList.remove('border-indigo-600'));
            thumb.classList.add('border-indigo-600');
        }

        function goToBooking() {
            const checkIn = document.getElementById('check-in-date').value;
            const checkOut = document.getElementById('check-out-date').value;
            if (!checkIn || !checkOut) {
                showToast('Vui lòng chọn ngày nhận/trả phòng!', 'error');
                return;
            }
            window.location.href = `/bookings/new?roomTypeId=${roomTypeId}&checkIn=${checkIn}&checkOut=${checkOut}`;
        }

        async function loadAvailableRooms() {
            try {
                const checkIn = document.getElementById('check-in-date').value;
                const checkOut = document.getElementById('check-out-date').value;
                
                const actionContainer = document.getElementById('booking-action-container');
                const alert = document.getElementById('no-rooms-alert');

                if (!checkIn || !checkOut) {
                    alert.classList.remove('hidden');
                    alert.textContent = 'Vui lòng chọn ngày để kiểm tra phòng trống.';
                    actionContainer.classList.add('hidden');
                    return;
                }

                if (new Date(checkIn) >= new Date(checkOut)) {
                    alert.classList.remove('hidden');
                    alert.textContent = 'Ngày trả phòng phải sau ngày nhận phòng.';
                    actionContainer.classList.add('hidden');
                    return;
                }

                // Vẫn gọi API để kiểm tra xem CÒN phòng trống nào không (quantity)
                const response = await fetch(`/api/room-types/${roomTypeId}/rooms?checkIn=${checkIn}&checkOut=${checkOut}`);
                const availableRooms = await response.json();

                if (availableRooms.length === 0) {
                    alert.classList.remove('hidden');
                    alert.textContent = 'Rất tiếc, hiện loại phòng này đã hết chỗ cho khoảng thời gian này.';
                    actionContainer.classList.add('hidden');
                } else {
                    alert.classList.add('hidden');
                    actionContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error checking availability:', error);
            }
        }

        async function loadFeedbacks() {
            try {
                const response = await fetch(`/api/room-types/${roomTypeId}/feedbacks?page=${currentFeedbackPage}&size=5`);
                const data = await response.json();
                const feedbacks = data.content || [];

                const container = document.getElementById('feedback-container');
                const noFeedback = document.getElementById('no-feedback-state');
                const loadMoreBtn = document.getElementById('load-more-feedback');

                if (feedbacks.length === 0 && currentFeedbackPage === 0) {
                    noFeedback.classList.remove('hidden');
                    loadMoreBtn.classList.add('hidden');
                    return;
                }

                noFeedback.classList.add('hidden');
                
                const feedbackHtml = feedbacks.map(fb => `
                    <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 space-y-4">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold">
                                    ${fb.booking?.account?.firstName?.charAt(0) || 'G'}
                                </div>
                                <div>
                                    <h4 class="font-black text-slate-900 text-sm">${fb.booking?.account?.firstName || 'Khách hàng'}</h4>
                                    <p class="text-[10px] text-slate-400 font-bold">${new Date(fb.createdAt).toLocaleDateString('vi-VN')}</p>
                                </div>
                            </div>
                            <div class="flex gap-0.5">
                                ${Array(5).fill(0).map((_, i) => `
                                    <i data-lucide="star" class="w-3 h-3 ${i < fb.rating ? 'text-amber-500 fill-amber-500' : 'text-slate-200'}"></i>
                                `).join('')}
                            </div>
                        </div>
                        <p class="text-sm text-slate-600 font-medium italic">"${fb.comment || 'Tuyệt vời!'}"</p>
                        ${fb.adminReply ? `
                            <div class="pl-4 border-l-2 border-indigo-200 mt-2">
                                <p class="text-[10px] font-black uppercase text-indigo-600 mb-1">Luxestay phản hồi:</p>
                                <p class="text-xs text-slate-500 italic">${fb.adminReply}</p>
                            </div>
                        ` : ''}
                    </div>
                `).join('');

                container.insertAdjacentHTML('beforeend', feedbackHtml);
                lucide.createIcons();

                if (!data.last) {
                    loadMoreBtn.classList.remove('hidden');
                } else {
                    loadMoreBtn.classList.add('hidden');
                }
            } catch (error) {
                console.error('Error loading feedbacks:', error);
            }
        }

        document.getElementById('load-more-feedback').addEventListener('click', () => {
            currentFeedbackPage++;
            loadFeedbacks();
        });
    </script>
</body>

</html>
