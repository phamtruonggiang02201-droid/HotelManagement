<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Quản lý Phòng - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1400px] mx-auto">
        <section id="manage-rooms-section" class="active">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">Quản lý Phòng nghỉ</h1>
                    <p class="text-slate-500 font-medium">Thiết lập và cập nhật thông tin phòng trong hệ thống.</p>
                </div>
                <div class="flex gap-4">
                    <div class="flex gap-2">
                        <a th:href="@{/api/rooms/export}" 
                           class="bg-emerald-600 text-white px-6 py-4 rounded-2xl font-black shadow-lg shadow-emerald-600/10 hover:bg-emerald-700 transition-all flex items-center gap-2">
                            <i data-lucide="file-down" class="w-5 h-5"></i>
                            <span class="hidden xl:inline">Xuất Excel</span>
                        </a>
                        <button onclick="document.getElementById('import-room-input').click()"
                           class="bg-slate-100 text-slate-700 px-6 py-4 rounded-2xl font-black hover:bg-slate-200 transition-all flex items-center gap-2">
                            <i data-lucide="file-up" class="w-5 h-5"></i>
                            <span class="hidden xl:inline">Nhập Excel</span>
                        </button>
                        <input type="file" id="import-room-input" class="hidden" accept=".xlsx, .xls" onchange="handleImportRooms(this)">
                    </div>
                    <button onclick="openRoomModal()"
                        class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20 hover:scale-105 transition-all">
                        + Thêm phòng mới
                    </button>
                </div>
            </div>

            <!-- Filter & Search Bar -->
            <div class="flex flex-col lg:flex-row gap-6 mb-12">
                <div class="flex-1 relative group">
                    <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-indigo-600 transition-colors"></i>
                    <input type="text" id="room-search-input" placeholder="Tìm kiếm theo tên phòng, loại phòng..."
                        class="w-full bg-white border border-slate-200 pl-16 pr-6 py-5 rounded-[24px] outline-none focus:ring-4 focus:ring-indigo-600/10 focus:border-indigo-600/50 shadow-sm transition-all text-sm font-bold">
                </div>

                <div class="flex flex-wrap gap-4">
                    <!-- Date Filter -->
                    <div class="relative min-w-[200px]">
                        <input type="date" id="filter-date" 
                            class="w-full bg-white border border-slate-200 px-8 py-5 rounded-[24px] outline-none focus:ring-4 focus:ring-indigo-600/10 focus:border-indigo-600/50 shadow-sm transition-all text-sm font-black text-slate-600 appearance-none">
                    </div>

                    <!-- Area Filter -->
                    <select id="filter-area" onchange="loadRoomsWithPagination(0)"
                        class="bg-white border border-slate-200 px-8 py-5 rounded-[24px] outline-none focus:ring-4 focus:ring-indigo-600/10 focus:border-indigo-600/50 shadow-sm transition-all text-sm font-black text-slate-600 appearance-none min-w-[160px]">
                        <option value="">Tất cả khu vực</option>
                        <!-- Loaded via AJAX -->
                    </select>

                    <!-- Room Type Filter -->
                    <select id="filter-room-type" onchange="loadRoomsWithPagination(0)"
                        class="bg-white border border-slate-200 px-8 py-5 rounded-[24px] outline-none focus:ring-4 focus:ring-indigo-600/10 focus:border-indigo-600/50 shadow-sm transition-all text-sm font-black text-slate-600 appearance-none min-w-[160px]">
                        <option value="">Tất cả loại phòng</option>
                        <!-- Loaded via AJAX -->
                    </select>

                    <!-- Page Size Selector -->
                    <select id="room-page-size" onchange="loadRoomsWithPagination(0)"
                        class="bg-white border border-slate-200 px-8 py-5 rounded-[24px] outline-none focus:ring-4 focus:ring-indigo-600/10 focus:border-indigo-600/50 shadow-sm transition-all text-sm font-black text-slate-600 appearance-none min-w-[140px]">
                        <option value="12">Mặc định (12)</option>
                        <option value="20">Hiện 20</option>
                        <option value="30">Hiện 30</option>
                        <option value="50">Hiện 50</option>
                    </select>
                </div>
            </div>

            <div id="room-manage-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Data will be loaded via AJAX -->
            </div>

            <!-- Pagination Controls -->
            <div id="room-pagination" class="flex justify-center items-center gap-4 mt-8">
                <!-- Pagination buttons will be rendered here -->
            </div>
        </section>

        <!-- Room Manage Modal -->
        <div id="room-manage-modal" class="modal">
            <div class="bg-white w-full max-w-2xl rounded-[56px] p-12 relative shadow-2xl">
                <button onclick="toggleModal('room-manage-modal', false)"
                    class="absolute top-8 right-8 text-slate-400"><i data-lucide="x" class="w-8 h-8"></i></button>
                <h2 id="room-modal-title" class="text-3xl font-black mb-8 text-slate-900">Thêm phòng mới</h2>
                <form id="room-form" class="space-y-6">
                    <input type="hidden" id="room-id">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Tên phòng</label>
                            <input type="text" id="room-name" required placeholder="Ví dụ: P.101"
                                class="w-full bg-slate-50 border border-slate-100 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Loại phòng</label>
                            <select id="room-type-id" required
                                class="w-full bg-slate-50 border border-slate-100 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 appearance-none">
                                <!-- Loaded via AJAX -->
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Trạng thái</label>
                            <select id="room-status"
                                class="w-full bg-slate-50 border border-slate-100 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 appearance-none">
                                <option value="AVAILABLE">Sẵn sàng</option>
                                <option value="OCCUPIED">Đang ở</option>
                                <option value="MAINTENANCE">Bảo trì</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Khu vực</label>
                            <select id="room-area"
                                class="w-full bg-slate-50 border border-slate-100 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 appearance-none">
                                <option value="">-- Chọn khu vực --</option>
                                <!-- Loaded via AJAX -->
                            </select>
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full bg-indigo-600 text-white py-6 rounded-[28px] font-black shadow-xl shadow-indigo-600/20 mt-4">
                        Lưu thông tin
                    </button>
                </form>
            </div>
        </div>

        <script th:src="@{/js/management.js}"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // Set today as default date
                const dateInput = document.getElementById('filter-date');
                if (dateInput) {
                    const today = new Date().toISOString().split('T')[0];
                    dateInput.value = today;
                    dateInput.addEventListener('change', () => loadRoomsWithPagination(0));
                }

                loadRoomsWithPagination();
                loadRoomTypes();
                loadAreas();

                const searchInput = document.getElementById('room-search-input');
                let debounceTimer;
                searchInput.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => loadRoomsWithPagination(0, searchInput.value), 300);
                });
            });

            async function handleImportRooms(input) {
                if (!input.files || input.files.length === 0) return;
                
                const file = input.files[0];
                const formData = new FormData();
                formData.append('file', file);

                toastService.info("Đang xử lý nhập dữ liệu phòng...");
                
                try {
                    const response = await fetch('/api/rooms/import', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    
                    if (response.ok) {
                        toastService.success(result.message);
                        loadRoomsWithPagination(); // Reload list
                    } else {
                        toastService.error(result.message);
                    }
                } catch (error) {
                    toastService.error("Có lỗi xảy ra khi nhập dữ liệu.");
                } finally {
                    input.value = ''; // Reset input
                }
            }
        </script>
    </div>
</body>

</html>
