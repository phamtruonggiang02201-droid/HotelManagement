<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="${#authorization.expression('isAuthenticated()') ? 'layout/main_layout' : 'layout/landing_layout'}">

<head>
    <title>Khám phá phòng nghỉ - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="pb-20 px-10 max-w-[1400px] mx-auto"
        th:classappend="${#authorization.expression('isAuthenticated()')} ? 'pt-10' : 'pt-32'">
        <div class="mb-16 text-center">
            <span class="text-indigo-600 text-xs font-black uppercase tracking-widest mb-4 inline-block">Our Luxury
                Suites</span>
            <h1 class="text-5xl font-black text-slate-900 mb-6">Không gian nghỉ dưỡng tuyệt vời</h1>
            <p class="text-slate-500 max-w-2xl mx-auto font-medium">Lựa chọn phòng phù hợp với phong cách của bạn. Mỗi
                phòng đều được thiết kế tỉ mỉ để mang lại trải nghiệm 5 sao.</p>
        </div>

        <!-- Filter Bar -->
        <div
            class="flex flex-wrap items-center justify-between gap-6 mb-12 bg-white p-8 rounded-[40px] border border-slate-100 shadow-sm">
            <div class="flex flex-wrap items-center gap-6">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Loại phòng</label>
                    <select id="filter-room-type" onchange="filterRooms()"
                        class="bg-slate-50 border-none p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700 min-w-[200px]">
                        <option value="">Tất cả loại phòng</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Giá phòng</label>
                    <select id="filter-price" onchange="filterRooms()"
                        class="bg-slate-50 border-none p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700 min-w-[200px]">
                        <option value="">Tất cả mức giá</option>
                        <option value="0-1000000">Dưới 1M</option>
                        <option value="1000000-3000000">1M - 3M</option>
                        <option value="3000000-99999999">Trên 3M</option>
                    </select>
                </div>
            </div>
            <div class="relative w-full md:w-auto">
                <input type="text" id="search-room" placeholder="Tìm loại phòng..." oninput="filterRooms()"
                    class="w-full md:w-80 bg-slate-50 border-none p-5 rounded-3xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                <i data-lucide="search" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
            </div>
        </div>

        <!-- Room Type Grid -->
        <div id="room-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Room type cards will be loaded here -->
            <div class="col-span-full py-20 text-center animate-pulse">
                <p class="text-slate-400 font-bold">Đang tải danh sách phòng...</p>
            </div>
        </div>
    </div>

    <script layout:fragment="script">
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([loadRoomTypes(), filterRooms()]);
        });

        async function loadRoomTypes() {
            try {
                const response = await fetch('/api/room-types');
                const data = await response.json();
                const roomTypes = data.content || [];
                const select = document.getElementById('filter-room-type');
                roomTypes.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type.id;
                    option.textContent = type.typeName;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading room types:', error);
            }
        }

        async function filterRooms() {
            const keyword = document.getElementById('search-room').value;

            const params = new URLSearchParams();
            if (keyword) params.append('keyword', keyword);
            params.append('size', '20');

            try {
                const response = await fetch(`/api/room-types/search?${params.toString()}`);
                const data = await response.json();
                renderRooms(data.content || []);
            } catch (error) {
                console.error('Error loading room types:', error);
                renderRooms([]);
            }
        }

        function renderRooms(types) {
            const container = document.getElementById('room-list-container');
            if (types.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i data-lucide="search-x" class="w-16 h-16 text-slate-200 mx-auto mb-4"></i>
                        <p class="text-slate-400 font-bold text-xl">Không tìm thấy loại phòng phù hợp</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = types.map(type => `
                <div class="group bg-white rounded-[48px] overflow-hidden border border-slate-100 shadow-sm hover:shadow-2xl transition-all duration-500">
                    <div class="relative h-72 overflow-hidden">
                        <img src="${type.roomImage || 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&q=80&w=800'}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-6 left-6">
                            <span class="bg-white/90 backdrop-blur-md px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-900 shadow-lg border border-white/50">
                                ${new Intl.NumberFormat('vi-VN').format(type.price)} VNĐ / Đêm
                            </span>
                        </div>
                        <div class="absolute top-6 right-6">
                            <span class="px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg ${type.availableCount > 0 ? 'bg-emerald-500' : 'bg-rose-500'} text-white">
                                ${type.availableCount > 0 ? 'Còn ' + type.availableCount + ' phòng' : 'Hết phòng'}
                            </span>
                        </div>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-slate-900 mb-1">${type.typeName}</h3>
                                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest leading-relaxed">Sức chứa: ${type.capacity} người</p>
                            </div>
                        </div>
                        <p class="text-slate-500 text-sm font-medium mb-8 line-clamp-2">${type.description || 'Không gian sang trọng với đầy đủ tiện nghi tiêu chuẩn 5 sao.'}</p>
                        
                        <div class="flex items-center gap-6 mb-8 text-slate-400">
                            <div class="flex items-center gap-2">
                                <i data-lucide="bed" class="w-4 h-4"></i>
                                <span class="text-xs font-bold">Giường Queen</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="wifi" class="w-4 h-4"></i>
                                <span class="text-xs font-bold">Free WiFi</span>
                            </div>
                        </div>
                        
                        <a href="/bookings/new?roomTypeId=${type.id}" 
                           class="${type.availableCount > 0 ? '' : 'pointer-events-none opacity-50 gray-scale'} block w-full text-center bg-slate-900 text-white py-5 rounded-3xl font-black hover:bg-indigo-600 transition-all shadow-xl shadow-slate-900/10">
                            ${type.availableCount > 0 ? 'Đặt phòng ngay' : 'Tạm hết phòng'}
                        </a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

    </script>
</body>

</html>
