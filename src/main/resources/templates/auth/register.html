<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/landing_layout}">

<head>
    <title>Đăng ký - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="min-h-screen flex items-center justify-center bg-slate-50 py-20 md:py-0">
        <div
            class="max-w-[1000px] w-full mx-10 bg-white rounded-[48px] overflow-hidden shadow-2xl flex flex-col md:flex-row h-auto md:h-[850px]">
            <!-- Left Side: Image -->
            <div class="hidden md:block w-1/2 relative">
                <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=1200"
                    class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-violet-600/20 backdrop-blur-[2px]"></div>
                <div class="absolute bottom-16 left-12 right-12 text-white">
                    <h2 class="text-4xl font-black mb-4 leading-tight">Khám phá không gian riêng của bạn</h2>
                    <p class="text-white/80 font-medium">Tham gia cộng đồng LuxeStay để tận hưởng những dịch vụ cao cấp
                        nhất cùng những ưu đãi bất tận.</p>
                </div>
            </div>

            <!-- Right Side: Form -->
            <div class="w-full md:w-1/2 p-12 md:p-16 flex flex-col justify-center">
                <h2 class="text-4xl font-black text-slate-900 mb-2">Đăng ký</h2>
                <p class="text-slate-500 text-sm font-medium mb-10">Bắt đầu hành trình nghỉ dưỡng của bạn</p>

                <!-- Error display for JS -->
                <div id="error-box"
                    class="hidden bg-rose-50 border border-rose-200 text-rose-700 px-6 py-4 rounded-3xl mb-8 text-xs font-bold uppercase tracking-wider flex items-center gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span id="error-message">Thông báo lỗi</span>
                </div>

                <form id="registerForm" th:action="@{/register}" method="post" class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Họ và
                            tên</label>
                        <input type="text" name="fullName" required
                            class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all">
                    </div>
                    <div>
                        <label
                            class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email</label>
                        <input type="email" name="email" required
                            class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tên đăng
                            nhập</label>
                        <input type="text" name="username" required
                            class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mật
                            khẩu</label>
                        <input type="password" name="password" required
                            class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all mb-1">
                        <p class="text-[10px] text-slate-400 font-medium ml-4">
                            Tối thiểu 8 ký tự, bao gồm chữ hoa, chữ thường, số và ký tự đặc biệt.
                        </p>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Xác nhận mật
                            khẩu</label>
                        <input type="password" name="confirmPassword" required
                            class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all">
                    </div>

                    <div class="pt-2">
                        <button type="submit" id="submitBtn"
                            class="w-full bg-indigo-600 text-white py-5 rounded-[28px] font-black shadow-xl shadow-indigo-600/20 hover:bg-slate-900 hover:scale-[1.02] transition-all duration-300 flex items-center justify-center gap-3">
                            <span>Tạo tài khoản</span>
                        </button>
                    </div>
                </form>

                <div class="mt-12 pt-8 border-t border-slate-50 text-center">
                    <p class="text-sm font-medium text-slate-500">
                        Đã có tài khoản? <a th:href="@{/login}" class="text-indigo-600 font-black">Đăng nhập ngay</a>
                    </p>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('registerForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const btn = document.getElementById('submitBtn');
                const errorBox = document.getElementById('error-box');
                const errorMessage = document.getElementById('error-message');

                // Loading state
                btn.disabled = true;
                btn.innerHTML = `<span class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span> <span>Đang xử lý...</span>`;
                errorBox.classList.add('hidden');

                try {
                    const formData = new FormData(this);
                    const response = await fetch(this.action, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (response.ok) {
                        toastService.success(result.message);
                        // Redirect to login after 2s
                        setTimeout(() => window.location.href = '/login', 2000);
                    } else {
                        toastService.error(result.message);
                        errorMessage.innerText = result.message;
                        errorBox.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerHTML = '<span>Tạo tài khoản</span>';
                    }
                } catch (error) {
                    toastService.error("Đã có lỗi xảy ra, vui lòng thử lại sau.");
                    btn.disabled = false;
                    btn.innerHTML = '<span>Tạo tài khoản</span>';
                }
            });

            lucide.createIcons();
        </script>
    </div>
</body>

</html>
