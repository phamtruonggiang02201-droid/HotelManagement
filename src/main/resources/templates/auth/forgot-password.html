<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/landing_layout}">

<head>
    <title>Quên mật khẩu - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="min-h-screen flex items-center justify-center bg-slate-50">
        <div class="max-w-md w-full mx-6 bg-white p-12 rounded-[56px] border border-slate-100 shadow-2xl">
            <div class="mb-10 text-center">
                <div
                    class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="mail-search" class="w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-black text-slate-900 mb-2">Quên mật khẩu?</h2>
                <p class="text-slate-500 text-sm font-medium">Đừng lo lắng, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu
                    cho bạn.</p>
            </div>

            <form id="forgotPasswordForm" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email tài
                        khoản</label>
                    <input type="email" name="email" required
                        class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all">
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-5 rounded-[28px] font-black shadow-xl shadow-indigo-600/20 hover:bg-slate-900 transition-all duration-300">
                    Gửi yêu cầu
                </button>
            </form>

            <div class="mt-8 text-center px-4">
                <a th:href="@{/login}"
                    class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Quay lại đăng nhập
                </a>
            </div>
        </div>

        <script th:inline="javascript">
            lucide.createIcons();

            document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);

                try {
                    const response = await fetch('/api/forgot-password', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();

                    if (response.ok) {
                        toastService.success(result.message);
                        e.target.reset();
                    } else {
                        toastService.error(result.message);
                    }
                } catch (err) {
                    toastService.error('Có lỗi xảy ra, vui lòng thử lại!');
                }
            });
        </script>
    </div>
</body>

</html>
