<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Chỉnh sửa đặt phòng - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1200px] mx-auto">
        <div class="mb-8">
            <a th:href="@{/bookings/my-bookings}" class="text-slate-400 hover:text-indigo-600 font-black text-xs uppercase tracking-widest flex items-center gap-2 group">
                <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
                Quay lại lịch sử
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Edit Form -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-[56px] p-12 border border-slate-100 shadow-sm">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-4xl font-black text-slate-900">Chỉnh sửa đặt phòng</h2>
                        <span class="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest"
                            th:text="|Mã đơn: #${booking.id.substring(0,8)}|">#ID-1234</span>
                    </div>
                    
                    <form id="edit-form" class="space-y-8">
                        <div class="relative group/search">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2 block">Thay đổi & Thêm loại phòng</label>
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                                <input type="text" id="room-search-input" placeholder="Tìm loại phòng khác..."
                                    class="w-full bg-slate-50 border border-slate-100 p-6 pl-16 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold transition-all"
                                    oninput="handleSearch(this.value)"
                                    onfocus="handleSearch(this.value)">
                            </div>
                            <div id="search-results" class="absolute left-0 right-0 top-full mt-4 bg-white rounded-[32px] border border-slate-100 shadow-2xl z-50 hidden max-h-[400px] overflow-y-auto p-4 space-y-2">
                                <!-- Results -->
                            </div>
                        </div>

                        <div id="room-selection-container" class="space-y-4 pt-4">
                            <!-- Selected rooms -->
                        </div>

                        <div class="grid grid-cols-2 gap-8 pt-4">
                            <div class="space-y-3">
                                <label class="text-xs font-black text-slate-400 uppercase ml-4">Ngày nhận phòng</label>
                                <input type="date" id="check-in" required onchange="calculateTotal()"
                                    th:value="${booking.checkIn}"
                                    class="w-full bg-slate-50 border border-slate-100 p-6 rounded-3xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                            </div>
                            <div class="space-y-3">
                                <label class="text-xs font-black text-slate-400 uppercase ml-4">Ngày trả phòng</label>
                                <input type="date" id="check-out" required onchange="calculateTotal()"
                                    th:value="${booking.checkOut}"
                                    class="w-full bg-slate-50 border border-slate-100 p-6 rounded-3xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-xs font-black text-slate-400 uppercase ml-4">Họ và tên khách hàng</label>
                            <input type="text" id="guest-name" required minlength="2" maxlength="50" placeholder="Nhập đầy đủ họ tên"
                                th:value="${booking.guest != null ? booking.guest.fullName : ''}"
                                class="w-full bg-slate-50 border border-slate-100 p-6 rounded-3xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                        </div>

                        <div class="space-y-3">
                            <label class="text-xs font-black text-slate-400 uppercase ml-4">Số điện thoại</label>
                            <input type="tel" id="guest-phone" required pattern="[0-9]{10,11}" placeholder="Nhập số điện thoại (10-11 số)"
                                th:value="${booking.guest != null ? booking.guest.phone : ''}"
                                class="w-full bg-slate-50 border border-slate-100 p-6 rounded-3xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                        </div>

                        <div class="flex gap-4 pt-4">
                            <button type="submit" id="submit-btn"
                                class="flex-1 bg-slate-900 text-white py-8 rounded-[32px] font-black text-xl shadow-2xl hover:scale-[1.02] transition-all flex items-center justify-center gap-4">
                                <i data-lucide="save" class="w-6 h-6"></i>
                                Cập nhật thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Summary Card -->
            <div class="lg:col-span-1">
                <div class="bg-indigo-600 rounded-[56px] p-10 text-white sticky top-10 shadow-2xl shadow-indigo-600/20">
                    <h3 class="text-2xl font-black mb-8 text-white/90">Chi phí dự tính mới</h3>
                    <div id="room-summary" class="space-y-6 mb-10 pb-10 border-b border-white/20">
                        <!-- Summary -->
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center text-indigo-100 font-bold">
                            <span>Giá mỗi đêm</span>
                            <span id="price-per-night">0 VNĐ</span>
                        </div>
                        <div class="flex justify-between items-center text-indigo-100 font-bold">
                            <span>Số đêm</span>
                            <span id="night-count">0</span>
                        </div>
                        <div class="pt-6 mt-6 border-t border-white/20 flex justify-between items-end">
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest text-indigo-200 mb-1">Tổng cộng mới</p>
                                <p id="total-price" class="text-4xl font-black">0 VNĐ</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script layout:fragment="script" th:inline="javascript">
        const bookingId = /*[[${booking.id}]]*/ '';
        let initialBookedRooms = /*[[${booking.bookedRooms}]]*/ [];
        let allRoomTypes = /*[[${roomTypes}]]*/ [];
        
        let selectedRooms = initialBookedRooms.map(br => ({
            roomType: br.roomType,
            quantity: br.quantity
        }));

        document.addEventListener('DOMContentLoaded', () => {
            // Set min dates
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            document.getElementById('check-in').min = today;
            document.getElementById('check-out').min = today;
            
            renderRoomSelections();
            calculateTotal();

            document.getElementById('edit-form').addEventListener('submit', handleUpdate);
        });

        function handleSearch(keyword) {
            const term = (keyword || '').toLowerCase().trim();
            const dropdown = document.getElementById('search-results');
            
            if (!term) {
                dropdown.classList.add('hidden');
                return;
            }

            const filtered = allRoomTypes.filter(rt => 
                rt.typeName.toLowerCase().includes(term) && 
                !selectedRooms.some(sr => sr.roomType.id === rt.id)
            ).slice(0, 5);

            if (filtered.length === 0) {
                dropdown.innerHTML = '<p class="p-4 text-center text-slate-400 font-bold text-sm">Không tìm thấy loại phòng nào!</p>';
            } else {
                dropdown.innerHTML = filtered.map(rt => `
                    <button type="button" onclick="addRoomToCartById('${rt.id}')" 
                        class="w-full flex items-center gap-4 p-4 hover:bg-slate-50 rounded-2xl transition-all text-left group border-none bg-transparent cursor-pointer">
                        <img src="${rt.roomImage || 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?w=80'}" class="w-12 h-12 object-cover rounded-xl shadow-sm">
                        <div class="flex-1">
                            <h5 class="font-black text-slate-900 group-hover:text-indigo-600 transition-colors">${rt.typeName}</h5>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sức chứa: ${rt.capacity} người</p>
                        </div>
                        <p class="font-black text-indigo-600">${new Intl.NumberFormat('vi-VN').format(rt.price)}đ</p>
                    </button>
                `).join('');
            }
            dropdown.classList.remove('hidden');
        }

        function addRoomToCartById(id) {
            const rt = allRoomTypes.find(rt => rt.id === id);
            if (rt) {
                selectedRooms.push({ roomType: rt, quantity: 1 });
                renderRoomSelections();
                calculateTotal();
                document.getElementById('room-search-input').value = '';
                document.getElementById('search-results').classList.add('hidden');
            }
        }

        function updateQuantity(id, delta) {
            const item = selectedRooms.find(item => item.roomType.id === id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + delta);
                renderRoomSelections();
                calculateTotal();
            }
        }

        function removeRoomType(id) {
            selectedRooms = selectedRooms.filter(item => item.roomType.id !== id);
            renderRoomSelections();
            calculateTotal();
        }

        function renderRoomSelections() {
            const container = document.getElementById('room-selection-container');
            const summary = document.getElementById('room-summary');
            
            if (selectedRooms.length === 0) {
                container.innerHTML = '<div class="p-4 bg-rose-50 rounded-3xl border border-rose-100 text-rose-600 text-center font-bold text-sm">Vui lòng chọn ít nhất một loại phòng!</div>';
                summary.innerHTML = '<p class="text-white/60 italic text-sm">Chưa có phòng nào được chọn.</p>';
                return;
            }

            container.innerHTML = selectedRooms.map(item => `
                <div class="flex items-center justify-between p-6 bg-slate-50 rounded-[32px] border border-slate-100 gap-4 group hover:border-indigo-200 transition-all">
                    <div class="flex items-center gap-4">
                        <img src="${item.roomType.roomImage || 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?w=100'}" class="w-16 h-16 object-cover rounded-2xl shadow-sm">
                        <div>
                            <h4 class="font-black text-slate-900">${item.roomType.typeName}</h4>
                            <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">${new Intl.NumberFormat('vi-VN').format(item.roomType.price)}đ / đêm</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 bg-white p-2 rounded-2xl shadow-sm">
                        <button type="button" onclick="updateQuantity('${item.roomType.id}', -1)" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-slate-100 font-black text-lg">−</button>
                        <span class="font-black text-lg w-6 text-center">${item.quantity}</span>
                        <button type="button" onclick="updateQuantity('${item.roomType.id}', 1)" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-slate-100 font-black text-lg">+</button>
                        <button type="button" onclick="removeRoomType('${item.roomType.id}')" class="ml-2 p-2 text-slate-300 hover:text-rose-500">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            summary.innerHTML = selectedRooms.map(item => `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center font-black">x${item.quantity}</div>
                    <div class="flex-1">
                        <h4 class="text-sm font-black text-white">${item.roomType.typeName}</h4>
                        <p class="text-[10px] text-indigo-200 font-bold uppercase">${new Intl.NumberFormat('vi-VN').format(item.roomType.price * item.quantity)}đ</p>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function calculateTotal() {
            const cin = document.getElementById('check-in').value;
            const cout = document.getElementById('check-out').value;
            let diffDays = 1;

            if (cin && cout) {
                const start = new Date(cin);
                const end = new Date(cout);
                diffDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                if (diffDays <= 0) diffDays = 1;
            }

            document.getElementById('night-count').textContent = diffDays;
            const totalPerNight = selectedRooms.reduce((sum, item) => sum + (item.roomType.price * item.quantity), 0);
            const finalTotal = totalPerNight * diffDays;

            document.getElementById('price-per-night').textContent = new Intl.NumberFormat('vi-VN').format(totalPerNight) + ' VNĐ';
            document.getElementById('total-price').textContent = new Intl.NumberFormat('vi-VN').format(finalTotal) + ' VNĐ';
        }

        async function handleUpdate(e) {
            e.preventDefault();
            if (selectedRooms.length === 0) {
                toastService.error('Vui lòng chọn ít nhất một loại phòng!');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="animate-spin" data-lucide="refresh-cw"></i> Đang xử lý...';
            lucide.createIcons();

            const requestData = {
                roomSelections: selectedRooms.map(item => ({ roomTypeId: item.roomType.id, quantity: item.quantity })),
                checkIn: document.getElementById('check-in').value,
                checkOut: document.getElementById('check-out').value,
                guestName: document.getElementById('guest-name').value,
                guestPhone: document.getElementById('guest-phone').value
            };

            try {
                const response = await fetch(`/bookings/api/edit/${bookingId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                const result = await response.json();
                if (response.ok) {
                    toastService.success('Đã cập nhật đơn đặt phòng thành công!');
                    setTimeout(() => window.location.href = '/bookings/my-bookings', 1500);
                } else {
                    toastService.error(result.message || 'Có lỗi xảy ra!');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i data-lucide="save"></i> Cập nhật thay đổi';
                    lucide.createIcons();
                }
            } catch (err) {
                toastService.error('Lỗi kết nối!');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i data-lucide="save"></i> Cập nhật thay đổi';
                lucide.createIcons();
            }
        }
    </script>
</body>

</html>
