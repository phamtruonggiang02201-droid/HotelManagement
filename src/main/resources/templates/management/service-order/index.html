<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Quản lý Đơn dịch vụ - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1400px] mx-auto">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 mb-2">Quản lý Đơn dịch vụ</h1>
                <p class="text-slate-500 font-medium">Theo dõi và cập nhật trạng thái các yêu cầu dịch vụ của khách hàng.</p>
            </div>
            
            <div class="flex items-center gap-4 bg-white p-2 rounded-3xl shadow-sm border border-slate-100">
                <div class="relative group">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-indigo-600 transition-colors"></i>
                    <input type="text" id="order-search" placeholder="Tìm tên khách, dịch vụ..."
                        class="pl-11 pr-6 py-3 bg-slate-50 border-none rounded-2xl text-sm font-bold focus:ring-2 focus:ring-indigo-600/20 w-64 transition-all">
                </div>
                <select id="status-filter" class="px-6 py-3 bg-slate-50 border-none rounded-2xl text-sm font-black text-slate-600 focus:ring-2 focus:ring-indigo-600/20 cursor-pointer">
                    <option value="">Tất cả trạng thái</option>
                    <option value="ORDERED">🛒 Mới đặt (Ordered)</option>
                    <option value="DELIVERED">🚚 Đã giao (Delivered)</option>
                    <option value="CANCELLED">❌ Đã hủy (Cancelled)</option>
                    <option value="COMPLETED">✅ Hoàn thành (Completed)</option>
                </select>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-50">
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Khách & Phòng</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Dịch vụ & SL</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Tổng tiền</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Thời gian</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Trạng thái</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="order-table-body" class="divide-y divide-slate-50">
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden py-32 text-center">
                <div class="w-24 h-24 bg-slate-50 rounded-[32px] flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="package-search" class="w-10 h-10 text-slate-300"></i>
                </div>
                <h3 class="text-xl font-black text-slate-900 mb-2">Không tìm thấy đơn dịch vụ nào</h3>
                <p class="text-slate-400 font-medium">Thử thay đổi từ khóa tìm kiếm hoặc bộ lọc trạng thái.</p>
            </div>

            <!-- Pagination -->
            <div class="px-8 py-6 border-t border-slate-50 flex items-center justify-between bg-slate-50/50">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" id="pagination-info">
                    Hiển thị 0 đơn hàng
                </p>
                <div class="flex gap-2" id="pagination-controls">
                    <!-- Pagination buttons -->
                </div>
            </div>
        </div>
    </div>

    <!-- Script Fragment -->
    <script layout:fragment="script" src="/js/service-order-management.js"></script>
</body>

</html>
