<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title th:text="${mode == 'create'} ? 'Thêm Tài khoản mới - LuxeStay' : 'Chi tiết Tài khoản - LuxeStay'">Chi tiết
        Tài khoản</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1000px] mx-auto">
        <div class="mb-8">
            <a th:href="@{/management/accounts}"
                class="inline-flex items-center text-slate-500 hover:text-indigo-600 transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i>
                <span class="font-medium">Quay lại danh sách</span>
            </a>
        </div>

        <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm p-12">
            <h1 class="text-3xl font-black text-slate-900 mb-2" id="page-title"
                th:text="${mode == 'create'} ? 'Thêm Tài khoản mới' : 'Chi tiết Tài khoản'">Chi tiết Tài khoản</h1>
            <p class="text-slate-500 mb-10" id="page-subtitle"
                th:text="${mode == 'create'} ? 'Điền thông tin để tạo tài khoản mới.' : 'Xem và chỉnh sửa thông tin tài khoản.'">
                Thông tin tài khoản</p>

            <form id="account-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <input type="hidden" id="account-id" th:value="${accountId}" />
                <input type="hidden" id="form-mode" th:value="${mode}" />

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Họ và tên</label>
                    <input type="text" id="fullName" name="fullName" required
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                        placeholder="Nguyễn Văn A" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                        placeholder="email@example.com" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                        placeholder="username" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2"
                        th:text="${mode == 'create'} ? 'Mật khẩu' : 'Mật khẩu mới (bỏ trống nếu không đổi)'">Mật
                        khẩu</label>
                    <input type="password" id="password" name="password" th:required="${mode == 'create'}"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                        placeholder="••••••••" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                        placeholder="0912345678" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Phân quyền</label>
                    <select id="roleName" name="roleName" required
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none bg-white">
                        <option value="">-- Chọn quyền --</option>
                        <option value="ADMIN">Admin</option>
                        <option value="MANAGER">Manager</option>
                        <option value="RECEPTION">Reception</option>
                        <option value="CUSTOMER">Customer</option>
                    </select>
                </div>

                <div class="md:col-span-2 flex justify-end gap-4 mt-4 pt-8 border-t border-slate-100">
                    <a th:href="@{/management/accounts}"
                        class="px-8 py-4 rounded-2xl border border-slate-200 font-bold text-slate-600 hover:bg-slate-50 transition-all">Hủy</a>
                    <button type="submit"
                        class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20 hover:scale-105 transition-all">
                        <span th:text="${mode == 'create'} ? 'Tạo tài khoản' : 'Lưu thay đổi'">Lưu</span>
                    </button>
                </div>
            </form>
        </div>

        <script th:src="@{/js/account-detail.js}"></script>
    </div>
</body>

</html>
