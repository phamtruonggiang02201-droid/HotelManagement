<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Quản lý Tài khoản - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1400px] mx-auto">
        <section id="manage-accounts-section" class="active">
            <div class="flex justify-between items-center mb-12">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">Quản lý Tài khoản</h1>
                    <p class="text-slate-500 font-medium">Quản lý người dùng, phân quyền và trạng thái hoạt động của tài
                        khoản.</p>
                </div>
                <div class="flex gap-4">
                    <div class="bg-white p-2 rounded-2xl border border-slate-100 flex items-center shadow-sm w-80">
                        <i data-lucide="search" class="w-5 h-5 text-slate-400 ml-3"></i>
                        <input type="text" id="account-search-input" placeholder="Tìm tên, username, email..." 
                            class="bg-transparent border-none px-4 py-2 outline-none font-bold text-slate-700 w-full placeholder:text-slate-300">
                    </div>
                    <div class="flex gap-3">
                        <a th:href="@{/management/accounts/api/export}" 
                           class="bg-emerald-600 text-white px-6 py-4 rounded-2xl font-black shadow-lg shadow-emerald-600/10 hover:bg-emerald-700 transition-all flex items-center gap-2">
                            <i data-lucide="file-down" class="w-5 h-5"></i>
                            <span class="hidden xl:inline">Xuất Excel</span>
                        </a>
                        <button onclick="document.getElementById('import-account-input').click()"
                           class="bg-slate-100 text-slate-700 px-6 py-4 rounded-2xl font-black hover:bg-slate-200 transition-all flex items-center gap-2">
                            <i data-lucide="file-up" class="w-5 h-5"></i>
                            <span class="hidden xl:inline">Nhập Excel</span>
                        </button>
                        <input type="file" id="import-account-input" class="hidden" accept=".xlsx, .xls" onchange="handleImportAccounts(this)">
                    </div>
                    <a th:href="@{/management/accounts/new}"
                        class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20 hover:scale-105 transition-all">
                        + Tài khoản
                    </a>
                </div>
            </div>

            <div class="bg-white rounded-[40px] border border-slate-100 overflow-hidden shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead
                        class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-8 py-6">Username</th>
                            <th class="px-8 py-6">Họ tên</th>
                            <th class="px-8 py-6">Email</th>
                            <th class="px-8 py-6">Số điện thoại</th>
                            <th class="px-8 py-6">Phần quyền</th>
                            <th class="px-8 py-6">Trạng thái</th>
                            <th class="px-8 py-6">Xác thực</th>
                            <th class="px-8 py-6 text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="account-manage-tbody" class="divide-y divide-slate-50 font-medium text-slate-600">
                        <!-- Data will be loaded via AJAX -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="mt-8 flex justify-center gap-2" id="account-pagination">
                <!-- Pagination buttons will be loaded via AJAX -->
            </div>
        </section>

        <!-- Account Manage Modal (Placeholder for now) -->
        <div id="account-manage-modal" class="modal">
            <div class="bg-white w-full max-w-2xl rounded-[56px] p-12 relative shadow-2xl">
                <button onclick="toggleModal('account-manage-modal', false)"
                    class="absolute top-8 right-8 text-slate-400"><i data-lucide="x" class="w-8 h-8"></i></button>
                <h2 id="account-modal-title" class="text-3xl font-black mb-8 text-slate-900">Thông tin tài khoản</h2>
                <p class="text-slate-500 mb-6">Tính năng chỉnh sửa tài khoản đang được phát triển.</p>
            </div>
        </div>

        <script th:src="@{/js/account-management.js}"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                loadAccountsForManage();
            });

            async function handleImportAccounts(input) {
                if (!input.files || input.files.length === 0) return;
                
                const file = input.files[0];
                const formData = new FormData();
                formData.append('file', file);

                toastService.info("Đang xử lý nhập dữ liệu...");
                
                try {
                    const response = await fetch('/management/accounts/api/import', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    
                    if (response.ok) {
                        toastService.success(result.message);
                        loadAccountsForManage(); // Reload list
                    } else {
                        toastService.error(result.message);
                    }
                } catch (error) {
                    toastService.error("Có lỗi xảy ra khi nhập dữ liệu.");
                } finally {
                    input.value = ''; // Reset input
                }
            }
        </script>
    </div>
</body>

</html>
