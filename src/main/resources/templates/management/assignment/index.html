<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Phân công công việc - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1400px] mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black text-slate-900">Phân công công việc</h1>
                <p class="text-slate-500 font-medium">Điều phối nhân sự theo khu vực và ca làm việc hàng ngày.</p>
            </div>
            <button onclick="openAssignModal()"
                class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20 hover:scale-105 transition-all">
                + Phân công mới
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm mb-8 flex flex-wrap items-center gap-6">
            <div class="flex items-center gap-3">
                <i data-lucide="calendar" class="w-5 h-5 text-slate-400"></i>
                <input type="date" id="filter-date" 
                    class="bg-slate-50 border-none rounded-xl px-4 py-2.5 font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 transition-all text-sm">
            </div>
            <div class="h-8 w-px bg-slate-100 mx-2"></div>
            <div class="flex gap-2">
                <button onclick="changeDate(-1)" class="p-2.5 hover:bg-slate-50 rounded-xl text-slate-400 transition-all">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
                <button onclick="setToToday()" class="px-5 py-2.5 bg-slate-50 hover:bg-slate-100 rounded-xl text-slate-600 font-bold text-sm transition-all">
                    Hôm nay
                </button>
                <button onclick="changeDate(1)" class="p-2.5 hover:bg-slate-50 rounded-xl text-slate-400 transition-all">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Assignment Grid Table -->
        <div class="bg-white rounded-[40px] border border-slate-100 shadow-xl overflow-hidden mb-12">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100">
                        <th class="px-8 py-6 text-left text-xs font-black text-slate-400 uppercase tracking-widest w-64">Khu vực</th>
                        <th class="px-8 py-6 text-center text-xs font-black text-slate-400 uppercase tracking-widest">
                            <div class="flex items-center justify-center gap-2">
                                <i data-lucide="sun" class="w-4 h-4 text-amber-500"></i> Ca Sáng
                            </div>
                        </th>
                        <th class="px-8 py-6 text-center text-xs font-black text-slate-400 uppercase tracking-widest border-x border-slate-100">
                            <div class="flex items-center justify-center gap-2">
                                <i data-lucide="cloud-sun" class="w-4 h-4 text-indigo-500"></i> Ca Chiều
                            </div>
                        </th>
                        <th class="px-8 py-6 text-center text-xs font-black text-slate-400 uppercase tracking-widest">
                            <div class="flex items-center justify-center gap-2">
                                <i data-lucide="moon" class="w-4 h-4 text-slate-600"></i> Ca Tối
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="assignment-grid-body">
                    <!-- Rows generated via JS -->
                </tbody>
            </table>
        </div>

        <!-- Assign Modal -->
        <div id="assignModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
            <div class="bg-white w-full max-w-lg rounded-[40px] p-10 shadow-2xl scale-95 opacity-0 transition-all duration-300">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h3 class="text-2xl font-black text-slate-900">Phân công nhân sự</h3>
                        <p class="text-slate-500 font-medium">Chọn nhân viên và khu vực trực.</p>
                    </div>
                    <button onclick="closeAssignModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl hover:bg-slate-100 text-slate-400 transition-all">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>

                <form id="assignForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Nhân viên</label>
                        <select id="employeeId" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all bg-slate-50 appearance-none">
                            <option value="">-- Chọn nhân viên --</option>
                            <!-- Loaded via JS -->
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Ngày</label>
                            <input type="date" id="workDate" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Ca làm việc</label>
                            <select id="shift" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all bg-slate-50 appearance-none">
                                <option value="Sáng">Sáng</option>
                                <option value="Chiều">Chiều</option>
                                <option value="Tối">Tối</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Khu vực</label>
                        <select id="area" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all bg-slate-50 appearance-none">
                            <option value="Sảnh chính">Sảnh chính</option>
                            <option value="Nhà hàng">Nhà hàng</option>
                            <option value="Tầng 1">Tầng 1</option>
                            <option value="Tầng 2">Tầng 2</option>
                            <option value="Tầng 3">Tầng 3</option>
                            <option value="Hồ bơi">Hồ bơi</option>
                            <option value="Bảo vệ / Cổng">Bảo vệ / Cổng</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Ghi chú (nếu có)</label>
                        <textarea id="notes" rows="3" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all bg-slate-50" placeholder="Ví dụ: Phụ trách hỗ trợ khách đoàn..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-indigo-600/20 hover:scale-[1.02] active:scale-95 transition-all">
                        Xác nhận phân công
                    </button>
                </form>
            </div>
        </div>

        <script th:src="@{/js/assignment-management.js}"></script>
    </div>
</body>

</html>
