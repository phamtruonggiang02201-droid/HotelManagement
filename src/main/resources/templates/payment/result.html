<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Kết quả thanh toán - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[800px] mx-auto">
        <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm p-12 text-center">
            <!-- Success Icon -->
            <div th:if="${success}"
                class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-8">
                <i data-lucide="check-circle" class="w-12 h-12 text-emerald-600"></i>
            </div>
            <!-- Failure Icon -->
            <div th:unless="${success}"
                class="w-24 h-24 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-8">
                <i data-lucide="x-circle" class="w-12 h-12 text-rose-600"></i>
            </div>

            <h1 class="text-3xl font-black text-slate-900 mb-4" th:text="${message}">Kết quả thanh toán</h1>

            <div class="bg-slate-50 rounded-2xl p-6 mb-8 text-left">
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div class="font-bold text-slate-500">Mã giao dịch:</div>
                    <div class="font-bold text-slate-900" th:text="${txnRef}">-</div>

                    <div class="font-bold text-slate-500">Số tiền:</div>
                    <div class="font-bold text-indigo-600"
                        th:text="${#numbers.formatDecimal(amount, 0, 'COMMA', 0, 'POINT') + ' VND'}">-</div>

                    <div class="font-bold text-slate-500">Nội dung:</div>
                    <div class="font-bold text-slate-900" th:text="${orderInfo}">-</div>

                    <div class="font-bold text-slate-500">Mã VNPay:</div>
                    <div class="font-bold text-slate-900" th:text="${transactionNo}">-</div>
                </div>
            </div>

            <a th:href="@{/dashboard}"
                class="inline-block bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20 hover:scale-105 transition-all">
                Quay lại Dashboard
            </a>
        </div>
    </div>
</body>

</html>
