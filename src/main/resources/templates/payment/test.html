<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Thanh toán VNPay - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[800px] mx-auto">
        <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm p-12">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="credit-card" class="w-10 h-10 text-indigo-600"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-900 mb-2">Thanh toán VNPay</h1>
                <p class="text-slate-500 font-medium">Nhập số tiền và nội dung giao dịch để thử nghiệm thanh toán qua
                    VNPay.</p>
            </div>

            <form id="vnpayForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Số tiền (VND)</label>
                    <input type="number" id="amount" name="amount" required min="10000" value="100000"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all font-bold"
                        placeholder="Nhập số tiền" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nội dung thanh toán</label>
                    <input type="text" id="orderInfo" name="orderInfo" required value="Thanh toan don hang test"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                        placeholder="Nội dung thanh toán" />
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-indigo-600/20 hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
                    <i data-lucide="external-link" class="w-5 h-5"></i>
                    Thanh toán với VNPay
                </button>
            </form>

            <div class="mt-8 p-6 bg-amber-50 rounded-2xl border border-amber-200">
                <h3 class="font-bold text-amber-800 mb-2 flex items-center gap-2">
                    <i data-lucide="info" class="w-5 h-5"></i>
                    Thẻ test (Sandbox)
                </h3>
                <ul class="text-sm text-amber-700 space-y-1">
                    <li><strong>Ngân hàng:</strong> NCB</li>
                    <li><strong>Số thẻ:</strong> 9704198526191432198</li>
                    <li><strong>Tên chủ thẻ:</strong> NGUYEN VAN A</li>
                    <li><strong>Ngày phát hành:</strong> 07/15</li>
                    <li><strong>Mật khẩu OTP:</strong> 123456</li>
                </ul>
            </div>
        </div>

        <script>
            document.getElementById('vnpayForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const amount = document.getElementById('amount').value;
                const orderInfo = document.getElementById('orderInfo').value;

                try {
                    const formData = new URLSearchParams();
                    formData.append('amount', amount);
                    formData.append('orderInfo', orderInfo);

                    const response = await fetch('/api/payment/create-vnpay', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();

                    if (data.paymentUrl) {
                        window.location.href = data.paymentUrl;
                    } else {
                        if (typeof toastService !== 'undefined') {
                            toastService.error(data.message || 'Có lỗi xảy ra');
                        }
                    }
                } catch (error) {
                    console.error('Error:', error);
                    if (typeof toastService !== 'undefined') {
                        toastService.error('Có lỗi xảy ra khi tạo yêu cầu thanh toán');
                    }
                }
            });
        </script>
    </div>
</body>

</html>
