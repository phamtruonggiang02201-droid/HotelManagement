<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Dịch vụ phòng - LuxeStay</title>
    <style>
        .service-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .room-card.selected {
            border-color: #4f46e5;
            background-color: #f5f3ff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .active-category {
            background-color: #4f46e5;
            color: #ffffff !important;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div layout:fragment="content" class="min-h-screen bg-slate-50 pt-10 pb-20 px-4 max-w-[1400px] mx-auto">
            
            <!-- Welcome Header -->
            <div class="text-center mb-12">
                <span class="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest">LuxeStay Room Service</span>
                <h1 class="text-4xl md:text-5xl font-black text-slate-900 mt-4 mb-2">Xin chào quý khách</h1>
                <p class="text-slate-500 font-medium">Quý khách đang ở phòng nào? Hãy để chúng tôi phục vụ bạn ngay!</p>
            </div>

            <!-- Stage 1: Room Selection -->
            <div id="step-1" class="mb-12">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-10 h-10 rounded-full bg-slate-900 text-white flex items-center justify-center font-black">1</div>
                    <h3 class="text-xl font-black text-slate-900">Chọn phòng của bạn</h3>
                </div>
                <div id="room-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    <!-- Loaded via JS -->
                    <div class="col-span-full py-20 text-center animate-pulse text-slate-400">
                        <i data-lucide="loader-2" class="w-10 h-10 animate-spin mx-auto mb-4"></i>
                        <p class="font-bold">Đang tìm danh sách phòng...</p>
                    </div>
                </div>
            </div>

            <!-- Stage 2: Service Selection (Hidden until room selected) -->
            <div id="step-2" class="opacity-30 pointer-events-none transition-all duration-500">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-10 h-10 rounded-full bg-slate-900 text-white flex items-center justify-center font-black">2</div>
                    <h3 class="text-xl font-black text-slate-900">Khám phá dịch vụ</h3>
                </div>
                
                <div class="grid grid-cols-12 gap-8">
                    <!-- Left: Services -->
                    <div class="col-span-12 lg:col-span-8 space-y-8">
                        <!-- Categories -->
                        <div id="category-box" class="flex gap-2 overflow-x-auto pb-4 custom-scrollbar whitespace-nowrap">
                            <button class="category-btn active-category px-6 py-3 rounded-2xl font-bold text-sm bg-white text-slate-600 border border-slate-100 shadow-sm transition-all" data-id="all">Tất cả</button>
                            <!-- More from server -->
                        </div>
                        
                        <!-- Grid -->
                        <div id="service-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Loaded via JS -->
                        </div>
                    </div>

                    <!-- Right: Cart Summary -->
                    <div class="col-span-12 lg:col-span-4">
                        <div class="bg-white rounded-[32px] border border-slate-100 shadow-xl overflow-hidden sticky top-32">
                            <div class="p-8 border-b border-slate-50 bg-slate-50/50">
                                <h4 class="font-black text-slate-900 uppercase tracking-widest text-xs mb-2">Giỏ hàng của bạn</h4>
                                <div id="display-room-badge" class="hidden">
                                    <span class="text-indigo-600 font-bold text-lg" id="room-name-label">Phòng ---</span>
                                </div>
                            </div>
                            
                            <div id="cart-container" class="p-8 max-h-[400px] overflow-y-auto custom-scrollbar">
                                <div id="empty-cart-msg" class="text-center py-10 opacity-20">
                                    <i data-lucide="shopping-basket" class="w-16 h-16 mx-auto mb-4"></i>
                                    <p class="font-bold">Hôm nay quý khách dùng gì ạ?</p>
                                </div>
                                <div id="cart-items" class="space-y-6"></div>
                            </div>

                            <div class="p-8 bg-slate-900 text-white space-y-6">
                                <div class="flex justify-between items-center">
                                    <span class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Thành tiền</span>
                                    <span class="text-3xl font-black" id="total-price">0đ</span>
                                </div>
                                <button id="submit-order-btn" disabled
                                    class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-600/30 disabled:opacity-30 disabled:cursor-not-allowed">
                                    Xác nhận phục vụ
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    </div>

    <th:block layout:fragment="script">
        <script th:src="@{/js/guest-quick-booking.js}"></script>
    </th:block>
</body>
</html>
