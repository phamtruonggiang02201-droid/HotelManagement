<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="${#authorization.expression('isAuthenticated()') ? 'layout/main_layout' : 'layout/landing_layout'}">

<head>
    <title>Dịch vụ - LuxeStay</title>
</head>

<body th:classappend="${#authorization.expression('isAuthenticated()') ? 'logged-in' : ''}">
    <div layout:fragment="content" class="min-h-screen bg-slate-50/50"
        th:classappend="${#authorization.expression('isAuthenticated()') ? 'pt-10 px-10' : 'pt-32 px-6'}">

        <div class="max-w-[1400px] mx-auto">
            <!-- Header Section -->
            <div class="mb-12">
                <h1 class="text-4xl font-black text-slate-900 mb-4 tracking-tight">Dịch vụ Khách sạn</h1>
                <p class="text-slate-500 font-medium text-lg">Trải nghiệm những tiện ích đẳng cấp nhất tại LuxeStay.</p>
            </div>

            <!-- Filter & Search Bar -->
            <div class="flex flex-col lg:flex-row gap-6 mb-12">
                <div class="flex-1 relative group">
                    <i data-lucide="search"
                        class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-rose-500 transition-colors"></i>
                    <input type="text" id="search-service" placeholder="Tìm kiếm dịch vụ..." oninput="filterServices()"
                        class="w-full bg-white border border-slate-200 pl-16 pr-6 py-5 rounded-[24px] outline-none focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500/50 shadow-sm transition-all text-sm font-bold">
                </div>

                <div class="flex flex-wrap gap-4">
                    <select id="filter-category" onchange="filterServices()"
                        class="bg-white border border-slate-200 px-8 py-5 rounded-[24px] outline-none focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500/50 shadow-sm transition-all text-sm font-bold appearance-none min-w-[200px]">
                        <option value="">Tất cả danh mục</option>
                    </select>
                </div>
            </div>

            <!-- Services Grid -->
            <div id="services-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 mb-20">
                <!-- Loading State -->
                <div class="col-span-full py-20 text-center">
                    <div
                        class="inline-block w-8 h-8 border-4 border-rose-600/20 border-t-rose-600 rounded-full animate-spin mb-4">
                    </div>
                    <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Đang tải dịch vụ...</p>
                </div>
            </div>
        </div>
    </div>

    <script layout:fragment="script">
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([loadCategories(), filterServices()]);
        });

        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                const categories = await response.json();
                const select = document.getElementById('filter-category');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.categoryName;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function filterServices() {
            const categoryId = document.getElementById('filter-category').value;
            const keyword = document.getElementById('search-service').value;

            const params = new URLSearchParams();
            if (keyword) params.append('keyword', keyword);
            // filter by category usually uses different endpoint or param, 
            // but for simplicity let's assume our search endpoint can handle type/category if we update it.
            // Since we didn't update HotelServiceImpl to handle categoryId in search, 
            // we'll just use the category-specific endpoint if categoryId is set.

            let url = '/api/services/search';
            if (categoryId) {
                // If category is selected, use category endpoint (this one doesn't support pagination/search in current impl)
                url = `/api/services/category/${categoryId}`;
            }

            try {
                const response = await fetch(url + (categoryId ? '' : `?${params.toString()}`));
                const data = await response.json();
                const services = categoryId ? data : (data.content || []);
                renderServices(services);
            } catch (error) {
                console.error('Error loading services:', error);
                renderServices([]);
            }
        }

        function renderServices(services) {
            const container = document.getElementById('services-container');
            if (services.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 bg-white rounded-[40px] border border-slate-100 text-center shadow-sm">
                        <i data-lucide="package-search" class="w-12 h-12 text-slate-200 mx-auto mb-4"></i>
                        <p class="text-slate-500 font-bold">Không tìm thấy dịch vụ nào phù hợp.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = services.map(srv => `
                <div class="group bg-white rounded-[40px] p-8 border border-slate-100 hover:border-rose-500/20 hover:shadow-2xl hover:shadow-rose-500/10 transition-all duration-500 relative overflow-hidden flex flex-col">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-rose-50 rounded-bl-[80px] -mr-16 -mt-16 group-hover:scale-110 transition-transform"></div>
                    
                    <div class="flex justify-between items-start mb-6 relative">
                        <div class="p-4 bg-slate-50 rounded-2xl group-hover:bg-rose-50 group-hover:text-rose-600 transition-colors">
                            <i data-lucide="zap" class="w-6 h-6"></i>
                        </div>
                        <span class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider">${srv.categoryName}</span>
                    </div>

                    <h3 class="text-xl font-black text-slate-900 mb-2 group-hover:text-rose-600 transition-colors">${srv.serviceName}</h3>
                    <p class="text-slate-500 text-sm font-medium mb-8 flex-grow">Tận hưởng dịch vụ chuyên nghiệp và chất lượng cao nhất phục vụ quý khách 24/7.</p>
                    
                    <div class="flex items-end justify-between border-t border-slate-50 pt-6">
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Giá từ</p>
                            <p class="text-2xl font-black text-slate-900">${new Intl.NumberFormat('vi-VN').format(srv.price)}<span class="text-xs ml-1 text-slate-400 font-bold tracking-normal">VNĐ</span></p>
                        </div>
                        <a href="/bookings/new" class="bg-slate-900 text-white p-4 rounded-2xl hover:bg-rose-600 transition-all shadow-lg shadow-slate-900/10 hover:shadow-rose-600/20">
                            <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
    </script>
</body>

</html>
