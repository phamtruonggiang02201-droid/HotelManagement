<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Employee Management</title>
</head>
<body>

<h2>Employee Management</h2>

<a th:href="@{/management/employee/new}">
  Create New Employee
</a>

<table border="1" width="100%" id="employeeTable">
  <thead>
  <tr>
    <th>Username</th>
    <th>Full Name</th>
    <th>Email</th>
    <th>Status</th>
  </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  async function loadEmployees() {
      const response = await fetch("/management/api/employee");
      const employees = await response.json();

      const tbody = document.querySelector("#employeeTable tbody");
      tbody.innerHTML = "";

      employees.forEach(emp => {
          tbody.innerHTML += `
              <tr>
                  <td>${emp.username}</td>
                  <td>${emp.fullName}</td>
                  <td>${emp.email}</td>
                  <td>${emp.status ? 'Active' : 'Locked'}</td>
              </tr>
          `;
      });
  }

  loadEmployees();
</script>

</body>
</html>
