<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Quản lý Loại phòng - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1400px] mx-auto">
        <section id="manage-room-types-section" class="active">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">Quản lý Loại phòng</h1>
                    <p class="text-slate-500 font-medium">Định nghĩa các phân hạng phòng và sức chứa.</p>
                </div>
                <a th:href="@{/management/room-types/new}"
                    class="bg-cyan-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-cyan-600/20 hover:scale-105 transition-all">
                    + Thêm loại phòng
                </a>
            </div>

            <!-- Search Bar -->
            <div class="mb-6">
                <input type="text" id="room-type-search-input" placeholder="Tìm kiếm theo tên loại phòng..."
                    class="w-full md:w-1/2 bg-white border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-cyan-500 shadow-sm">
            </div>

            <div class="bg-white rounded-[40px] border border-slate-100 overflow-hidden shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead
                        class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-8 py-6">Tên Loại</th>
                            <th class="px-8 py-6">Mô tả</th>
                            <th class="px-8 py-6">Giá / Đêm</th>
                            <th class="px-8 py-6">Sức chứa</th>
                            <th class="px-8 py-6 text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="room-type-manage-tbody" class="divide-y divide-slate-50 font-medium text-slate-600">
                        <!-- Data will be loaded via AJAX -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination Controls -->
            <div id="room-type-pagination" class="flex justify-center items-center gap-4 mt-8">
                <!-- Pagination buttons will be rendered here -->
            </div>
        </section>

        <script th:src="@{/js/management.js}"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                loadRoomTypesWithPagination();

                const searchInput = document.getElementById('room-type-search-input');
                let debounceTimer;
                searchInput.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => loadRoomTypesWithPagination(0, searchInput.value), 300);
                });
            });
        </script>
    </div>
</body>

</html>
