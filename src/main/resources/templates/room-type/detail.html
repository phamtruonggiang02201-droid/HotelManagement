<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title th:text="${mode == 'create'} ? 'Thêm Loại phòng mới - LuxeStay' : (${mode == 'edit'} ? 'Chỉnh sửa Loại phòng - LuxeStay' : 'Chi tiết Loại phòng - LuxeStay')">
        Chi tiết Loại phòng
    </title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1200px] mx-auto">
        <div class="mb-8">
            <a th:href="@{/management/room-types}"
                class="inline-flex items-center text-slate-500 hover:text-cyan-600 transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i>
                <span class="font-medium">Quay lại danh sách</span>
            </a>
        </div>

        <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm p-12">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 mb-2" id="page-title"
                        th:text="${mode == 'create'} ? 'Thêm Loại phòng mới' : (${mode == 'edit'} ? 'Chỉnh sửa Loại phòng' : 'Chi tiết Loại phòng')">
                        Chi tiết Loại phòng
                    </h1>
                    <p class="text-slate-500" id="page-subtitle"
                        th:text="${mode == 'create'} ? 'Cấu hình phân hạng phòng và tiện ích mới.' : 'Xem thông tin và hình ảnh đại diện của loại phòng.'">
                        Cấu hình Loại phòng
                    </p>
                </div>
                <div th:if="${mode == 'view'}" class="flex gap-4">
                    <a th:href="@{/management/room-types/{id}/edit(id=${roomTypeId})}"
                        class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20 hover:scale-105 transition-all text-sm uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="edit-3" class="w-4 h-4"></i> Chỉnh sửa
                    </a>
                </div>
            </div>

            <form id="room-type-form" class="space-y-10">
                <input type="hidden" id="room-type-id" th:value="${roomTypeId}" />
                <input type="hidden" id="form-mode" th:value="${mode}" />

                <!-- Main Info Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2">Tên loại phòng</label>
                            <input type="text" id="typeName" name="typeName" required th:readonly="${mode == 'view'}"
                                class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all font-bold text-slate-900"
                                placeholder="Ví dụ: Deluxe King" />
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2">Giá / Đêm (VNĐ)</label>
                                <input type="number" id="price" name="price" required th:readonly="${mode == 'view'}"
                                    class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all font-bold text-indigo-600"
                                    placeholder="1500000" />
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2">Sức chứa (Người)</label>
                                <input type="number" id="capacity" name="capacity" required th:readonly="${mode == 'view'}"
                                    class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all font-bold text-cyan-600"
                                    placeholder="2" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2">Mô tả</label>
                            <textarea id="description" name="description" rows="5" th:readonly="${mode == 'view'}"
                                class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all font-medium text-slate-600 leading-relaxed"
                                placeholder="Mô tả ngắn gọn về tiện nghi và đặc điểm loại phòng..."></textarea>
                        </div>
                    </div>

                    <!-- Image Section -->
                    <div class="space-y-6">
                        <div class="bg-slate-50 p-8 rounded-[40px] border border-slate-100 flex flex-col items-center justify-center min-h-[300px] relative overflow-hidden group">
                            <label class="absolute top-6 left-8 text-[10px] font-black text-slate-400 uppercase tracking-widest">Ảnh đại diện</label>
                            
                            <img id="room-image-preview" src="https://via.placeholder.com/600x400?text=No+Image" 
                                class="w-full h-full object-cover absolute inset-0 opacity-50 gray-scale group-hover:opacity-100 transition-all duration-700">
                            
                            <div th:if="${mode != 'view'}" class="relative z-10 flex flex-col items-center">
                                <button type="button" onclick="document.getElementById('room-image-file').click()"
                                    class="bg-white/90 backdrop-blur text-cyan-600 px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-xl hover:bg-white transition-all">
                                    Thay đổi ảnh chính
                                </button>
                                <input type="file" id="room-image-file" class="hidden" accept="image/*">
                                <input type="hidden" id="roomImage" name="roomImage">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Gallery Section -->
                <div class="pt-10 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-6 px-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Bộ sưu tập ảnh (Gallery)</label>
                        <button th:if="${mode != 'view'}" type="button" onclick="document.getElementById('gallery-images-file').click()"
                            class="text-cyan-600 text-xs font-black hover:underline flex items-center gap-1">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm ảnh vào bộ sưu tập
                        </button>
                        <input type="file" id="gallery-images-file" class="hidden" accept="image/*" multiple>
                    </div>
                    
                    <div id="gallery-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 bg-slate-50/50 p-8 rounded-[40px] min-h-[160px] border border-slate-100 border-dashed">
                        <!-- Gallery items -->
                        <div id="gallery-empty-state" class="col-span-full flex flex-col items-center justify-center text-slate-300 py-10">
                            <i data-lucide="images" class="w-12 h-12 mb-4"></i>
                            <p class="text-xs font-black uppercase tracking-widest">Chưa có ảnh nào trong bộ sưu tập</p>
                        </div>
                    </div>
                </div>

                <!-- Form Controls -->
                <div th:if="${mode != 'view'}" class="flex justify-end gap-4 mt-12 pt-10 border-t border-slate-100">
                    <a th:href="@{/management/room-types}"
                        class="px-10 py-5 rounded-3xl border border-slate-200 font-bold text-slate-600 hover:bg-slate-50 transition-all uppercase text-xs tracking-widest">Hủy</a>
                    <button type="submit"
                        class="bg-cyan-600 text-white px-12 py-5 rounded-3xl font-black shadow-xl shadow-cyan-600/20 hover:scale-105 transition-all uppercase text-xs tracking-widest">
                        <span th:text="${mode == 'create'} ? 'Thêm Loại phòng' : 'Lưu thay đổi'">Lưu</span>
                    </button>
                </div>
            </form>
        </div>

        <script th:src="@{/js/toast.js}"></script>
        <script th:src="@{/js/room-type-detail.js}"></script>
    </div>
</body>

</html>
