<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main_layout}">

<head>
    <title>Quản lý Đặt phòng - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="px-10 py-10 max-w-[1400px] mx-auto">
        <div class="mb-12 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black text-slate-900 mb-2">Toàn bộ Lịch sử Đặt phòng</h1>
                <p class="text-slate-500 font-medium">Danh sách tất cả các đơn đặt phòng trong hệ thống LuxeStay.</p>
            </div>
            <div class="flex gap-4">
                <a th:href="@{/bookings/api/export}" 
                   class="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 hover:scale-[1.02] transition-all flex items-center gap-3">
                    <i data-lucide="file-spreadsheet" class="w-5 h-5"></i>
                    <span>Xuất Excel</span>
                </a>
                <div class="bg-white p-2 rounded-2xl border border-slate-100 flex items-center shadow-sm">
                    <input type="text" placeholder="Tìm kiếm booking..." class="bg-transparent border-none px-6 py-2 outline-none font-bold text-slate-700 w-64">
                    <button class="bg-slate-900 text-white p-3 rounded-xl hover:bg-indigo-600 transition-all">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-50">
                            <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Mã Đặt Phòng</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Khách hàng</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Thời gian</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Phòng</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Tổng tiền</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Trạng thái</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr th:each="booking : ${bookings}" class="hover:bg-slate-50 transition-colors group">
                            <td class="px-8 py-6">
                                <span class="font-black text-slate-900" th:text="|#${booking.id.substring(0,8)}|">#BOOK-123</span>
                            </td>
                            <td class="px-8 py-6">
                                <div class="font-black text-slate-900" 
                                     th:text="${booking.guest != null ? booking.guest.fullName : (booking.account != null ? booking.account.firstName + ' ' + booking.account.lastName : 'Khách vãng lai')}">Nguyễn Văn A</div>
                                <div class="text-[10px] font-bold text-slate-400" 
                                     th:text="${booking.guest != null ? booking.guest.phone : (booking.account != null ? 'Account user' : 'No phone')}">0987654321</div>
                            </td>
                            <td class="px-8 py-6">
                                <div class="flex flex-col gap-1">
                                    <div class="flex items-center gap-2 text-xs font-black text-slate-700">
                                        <i data-lucide="arrow-right-circle" class="w-3 h-3 text-emerald-500"></i>
                                        <span th:text="${booking.checkIn}">12/03/2026</span>
                                    </div>
                                    <div class="flex items-center gap-2 text-xs font-black text-slate-700">
                                        <i data-lucide="arrow-left-circle" class="w-3 h-3 text-rose-500"></i>
                                        <span th:text="${booking.checkOut}">15/03/2026</span>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-6">
                                <div class="flex flex-wrap gap-1">
                                    <th:block th:each="br : ${booking.bookedRooms}">
                                        <span class="px-2 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-black rounded-lg border border-indigo-100" 
                                              th:text="|${br.roomType.typeName} x${br.quantity}|"></span>
                                    </th:block>
                                    <th:block th:each="rm : ${booking.rooms}">
                                        <span class="px-2 py-1 bg-slate-100 text-slate-600 text-[10px] font-black rounded-lg border border-slate-200" 
                                              th:text="${rm.roomName}"></span>
                                    </th:block>
                                </div>
                                <!-- Services Detail -->
                                <div th:if="${booking.bookedServices != null and !booking.bookedServices.isEmpty()}" class="mt-2 pt-2 border-t border-slate-50 space-y-1">
                                    <th:block th:each="bs : ${booking.bookedServices}">
                                        <div th:each="detail : ${bs.details}" class="flex flex-col gap-0.5 mb-1 last:mb-0">
                                            <div class="flex justify-between items-center bg-slate-50/50 px-2 py-1 rounded-lg">
                                                <span class="text-[9px] font-bold text-slate-700" th:text="${detail.service.serviceName}">Service</span>
                                                <span th:class="|px-1.5 py-0.5 rounded-full text-[7px] font-black uppercase ${detail.serviceStatus == 'COMPLETED' ? 'bg-emerald-100 text-emerald-600' : (detail.serviceStatus == 'PROCESSING' ? 'bg-amber-100 text-amber-600' : 'bg-slate-200 text-slate-500')}|"
                                                      th:text="${detail.serviceStatus == 'COMPLETED' ? 'Xong' : (detail.serviceStatus == 'PROCESSING' ? 'Làm' : (detail.serviceStatus == 'PENDING' ? 'Chờ' : 'Hủy'))}">Status</span>
                                            </div>
                                            <div class="px-2 text-[8px] font-medium text-slate-400 flex items-center gap-1" th:if="${detail.staffName != null}">
                                                <i data-lucide="user" class="w-2.5 h-2.5 text-slate-300"></i>
                                                <span th:text="${detail.staffName}">Staff</span>
                                            </div>
                                        </div>
                                    </th:block>
                                </div>
                            </td>
                            <td class="px-8 py-6">
                                <div class="font-black text-slate-900" 
                                     th:text="${booking.totalAmount != null ? #numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}">
                                    2.000.000 đ
                                </div>
                            </td>
                            <td class="px-8 py-6">
                                <span th:class="|px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-sm ${booking.status == 'PAID' ? 'bg-emerald-100 text-emerald-600' : (booking.status == 'PENDING_PAYMENT' ? 'bg-amber-100 text-amber-600' : (booking.status == 'CANCELLED' ? 'bg-rose-100 text-rose-600' : (booking.status == 'CHECKED_IN' ? 'bg-indigo-100 text-indigo-600' : (booking.status == 'CHECKED_OUT' ? 'bg-slate-100 text-slate-600' : 'bg-slate-50 text-slate-400'))))}|"
                                      th:text="${booking.status == 'PAID' ? 'Đã thanh toán' : (booking.status == 'PENDING_PAYMENT' ? 'Chờ thanh toán' : (booking.status == 'CANCELLED' ? 'Đã hủy' : (booking.status == 'CHECKED_IN' ? 'Đang lưu trú' : (booking.status == 'CHECKED_OUT' ? 'Đã hoàn thành' : booking.status))))}">
                                    Status
                                </span>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <a th:href="@{'/bookings/' + ${booking.id}}" 
                                   class="inline-flex items-center justify-center w-10 h-10 bg-white border border-slate-100 rounded-xl text-slate-400 hover:bg-slate-900 hover:text-white hover:border-slate-900 transition-all shadow-sm">
                                    <i data-lucide="eye" class="w-5 h-5"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${totalPages > 1}" class="mt-12 flex items-center justify-center gap-2">
            <a th:if="${currentPage > 0}"
               th:href="@{/bookings/admin/history(page=${currentPage - 1})}"
               class="px-4 h-12 flex items-center justify-center rounded-xl bg-white border border-slate-100 text-slate-500 font-black text-sm hover:border-indigo-600 hover:text-indigo-600 transition-all">
                Trước
            </a>

            <a th:each="i : ${#numbers.sequence(T(java.lang.Math).max(0, currentPage - 2), T(java.lang.Math).min(totalPages - 1, currentPage + 2))}"
               th:href="@{/bookings/admin/history(page=${i})}"
               th:class="|w-12 h-12 flex items-center justify-center rounded-xl font-black text-sm transition-all ${currentPage == i ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100 hover:border-indigo-600 hover:text-indigo-600'}|"
               th:text="${i + 1}">1</a>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/bookings/admin/history(page=${currentPage + 1})}"
               class="px-4 h-12 flex items-center justify-center rounded-xl bg-white border border-slate-100 text-slate-500 font-black text-sm hover:border-indigo-600 hover:text-indigo-600 transition-all">
                Sau
            </a>
        </div>
    </div>
</body>

</html>
