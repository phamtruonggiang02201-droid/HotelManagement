<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Quản lý tài khoản</title>
</head>

<body class="bg-slate-100">

<!-- Sidebar -->
<div th:replace="fragments/sidebar :: sidebar"></div>

<!-- Main -->
<div class="ml-64">
    <!-- Header -->
    <div th:replace="fragments/header :: header"></div>

    <main class="p-10">
        <h1 class="text-2xl font-bold mb-6">Danh sách tài khoản</h1>

        <div class="bg-white rounded-2xl shadow border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
                <tr>
                    <th class="px-6 py-4 text-left">Username</th>
                    <th class="px-6 py-4 text-left">Họ tên</th>
                    <th class="px-6 py-4 text-left">Email</th>
                    <th class="px-6 py-4 text-left">Role</th>
                    <th class="px-6 py-4 text-center">Trạng thái</th>
                    <th class="px-6 py-4 text-center">Verify</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="acc : ${accounts}"
                    class="border-t hover:bg-slate-50 transition">
                    <td class="px-6 py-4 font-medium" th:text="${acc.username}"></td>

                    <td class="px-6 py-4"
                        th:text="${acc.firstName + ' ' + acc.lastName}"></td>

                    <td class="px-6 py-4" th:text="${acc.email}"></td>

                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold bg-indigo-100 text-indigo-700"
                              th:text="${acc.role.roleName}"></span>
                    </td>

                    <td class="px-6 py-4 text-center">
                        <span th:if="${acc.status}"
                              class="text-green-600 font-bold">ACTIVE</span>
                        <span th:if="${!acc.status}"
                              class="text-rose-500 font-bold">LOCKED</span>
                    </td>

                    <td class="px-6 py-4 text-center">
                        <span th:if="${acc.emailVerified}"
                              class="text-green-600">✔</span>
                        <span th:if="${!acc.emailVerified}"
                              class="text-slate-400">✖</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="fragments/footer :: footer"></div>
</div>

</body>
</html>
