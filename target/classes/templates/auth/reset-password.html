<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/landing_layout}">

<head>
    <title>Đặt lại mật khẩu - LuxeStay</title>
</head>

<body>
    <div layout:fragment="content" class="max-w-md mx-auto py-20">
        <div class="bg-white p-10 rounded-[48px] border border-slate-100 shadow-2xl">
            <div class="mb-10 text-center">
                <div
                    class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="shield-check" class="w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-black text-slate-900 mb-2">Mật khẩu mới</h2>
                <p class="text-slate-500 text-sm font-medium">Thiết lập mật khẩu mới cho tài khoản của bạn.</p>
            </div>

            <form id="resetPasswordForm" class="space-y-6">
                <input type="hidden" name="token" th:value="${param.token}">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mật khẩu
                        mới</label>
                    <input type="password" name="password" required
                        class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Xác nhận mật
                        khẩu</label>
                    <input type="password" name="confirmPassword" required
                        class="w-full bg-slate-50 border border-slate-100 p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold transition-all">
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-5 rounded-[28px] font-black shadow-xl shadow-indigo-600/20 hover:bg-slate-900 transition-all duration-300">
                    Cập nhật mật khẩu
                </button>
            </form>
        </div>
        <script th:inline="javascript">
            lucide.createIcons();

            document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);

                try {
                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();

                    if (response.ok) {
                        toastService.success(result.message);
                        setTimeout(() => {
                            window.location.href = result.targetUrl;
                        }, 2000);
                    } else {
                        toastService.error(result.message);
                    }
                } catch (err) {
                    toastService.error('Có lỗi xảy ra, vui lòng thử lại!');
                }
            });
        </script>
    </div>
</body>

</html>
