<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - LuxeStay">LuxeStay</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" href="data:,">

    <!-- Toast Service -->
    <link rel="stylesheet" th:href="@{/css/toast.css}">
    <script th:src="@{/js/toast.js}"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .sidebar-item-active {
            background-color: #1e293b;
            color: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        section {
            display: block;
        }

        section.active {
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        /* Sidebar visibility states */
        .auth-only {
            display: none;
        }

        body.logged-in .auth-only {
            display: flex;
        }

        body.logged-in .guest-only {
            display: none !important;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body class="overflow-x-hidden" th:classappend="${#authorization.expression('isAuthenticated()')} ? 'logged-in' : ''">
    <div id="toast-container"></div>

    <div class="flex min-h-screen">
        <!-- SIDEBAR -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- MAIN CONTENT AREA -->
        <div class="flex-1 ml-64 min-w-0">
            <!-- Header -->
            <div th:replace="~{fragments/header :: header}"></div>

            <main layout:fragment="content">
                <!-- Content will be injected here -->
            </main>

            <!-- Footer -->
            <div th:replace="~{fragments/footer :: footer}"></div>
        </div>
    </div>

    <!-- MODALS Shell (Shared) -->
    <div id="modal-container"></div>

    <script th:inline="javascript">
        // Khởi tạo Lucide Icons
        lucide.createIcons();

        // Hàm helper để mở/đóng modal (Thêm vào layout để dùng chung)
        function toggleModal(modalId, show) {
            const modal = document.getElementById(modalId);
            if (modal) {
                if (show) modal.classList.add('active');
                else modal.classList.remove('active');
            }
        }

        // Xử lý Đăng xuất AJAX
        document.addEventListener('submit', async (e) => {
            if (e.target && e.target.id === 'logoutForm') {
                e.preventDefault();
                try {
                    const response = await fetch(e.target.action, { method: 'POST' });
                    if (response.ok) {
                        toastService.success('Đã đăng xuất thành công!');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    }
                } catch (err) {
                    window.location.href = '/';
                }
            }
        });
    </script>
</body>

</html>
